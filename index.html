<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Drift-o-Meter — Studio Pierce</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Instrument Sans', sans-serif; background: #0A0A08; color: #E8E4DC; min-height: 100vh; }
  .header { padding: 3rem 3rem 2rem; border-bottom: 0.5px solid rgba(232,228,220,0.12); }
  .studio-tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; color: rgba(232,228,220,0.35); text-transform: uppercase; margin-bottom: 1.5rem; }
  h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 400; line-height: 1.05; color: #E8E4DC; letter-spacing: -0.02em; }
  h1 em { font-style: italic; color: #C8A96E; }
  .subtitle { margin-top: 0.75rem; font-size: 14px; color: rgba(232,228,220,0.45); max-width: 420px; line-height: 1.6; }
  .input-section { padding: 2.5rem 3rem; }
  .input-wrapper { display: flex; max-width: 580px; border: 0.5px solid rgba(232,228,220,0.2); border-radius: 4px; overflow: hidden; transition: border-color 0.2s; }
  .input-wrapper:focus-within { border-color: #C8A96E; }
  .input-wrapper input { flex: 1; background: rgba(232,228,220,0.04); border: none; outline: none; padding: 1rem 1.25rem; font-family: 'Instrument Sans', sans-serif; font-size: 15px; color: #E8E4DC; caret-color: #C8A96E; }
  .input-wrapper input::placeholder { color: rgba(232,228,220,0.25); }
  .run-btn { background: #C8A96E; border: none; padding: 1rem 1.5rem; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: #0A0A08; cursor: pointer; transition: background 0.2s, opacity 0.2s; white-space: nowrap; }
  .run-btn:hover { background: #D4BA84; }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status-line { margin-top: 1rem; font-family: 'DM Mono', monospace; font-size: 11px; color: rgba(232,228,220,0.35); letter-spacing: 0.05em; min-height: 1.2em; }
  .status-line.active { color: #C8A96E; }
  .error-msg { font-size: 13px; color: rgba(220,100,100,0.8); margin-top: 0.75rem; }
  .results { padding: 0 3rem 3rem; display: none; }
  .results.visible { display: block; }
  .brand-title { font-family: 'DM Serif Display', serif; font-size: 1.6rem; font-weight: 400; color: #E8E4DC; margin-bottom: 0.25rem; }
  .audit-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(232,228,220,0.3); letter-spacing: 0.1em; margin-bottom: 2rem; }
  .score-hero { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.5rem; }
  .score-number { font-family: 'DM Serif Display', serif; font-size: 5rem; line-height: 1; color: #C8A96E; }
  .score-denom { font-size: 1.2rem; color: rgba(232,228,220,0.3); }
  .score-label { font-size: 13px; color: rgba(232,228,220,0.45); margin-bottom: 2rem; font-style: italic; }
  .verdict { max-width: 560px; font-size: 15px; line-height: 1.75; color: rgba(232,228,220,0.8); margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 0.5px solid rgba(232,228,220,0.1); }
  .dimensions { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(232,228,220,0.08); margin-bottom: 2rem; }
  .dimension { background: #0A0A08; padding: 1.25rem 1.5rem; }
  .dim-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem; }
  .dim-name { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: rgba(232,228,220,0.4); text-transform: uppercase; }
  .dim-score { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: #C8A96E; }
  .dim-score span { font-size: 0.7rem; color: rgba(232,228,220,0.2); font-family: 'Instrument Sans', sans-serif; }
  .dim-bar-track { height: 2px; background: rgba(232,228,220,0.08); border-radius: 1px; margin-bottom: 0.6rem; overflow: hidden; }
  .dim-bar-fill { height: 100%; background: #C8A96E; border-radius: 1px; transition: width 1s ease; }
  .dim-note { font-size: 12px; color: rgba(232,228,220,0.45); line-height: 1.5; }
  .drift-signal { border: 0.5px solid rgba(200,169,110,0.25); padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
  .drift-signal-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; color: #C8A96E; text-transform: uppercase; margin-bottom: 0.5rem; }
  .drift-signal-text { font-size: 13px; color: rgba(232,228,220,0.6); line-height: 1.6; }
  .footer-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: rgba(232,228,220,0.15); letter-spacing: 0.1em; text-transform: uppercase; }
  @media (max-width: 600px) {
    .header, .input-section, .results { padding-left: 1.5rem; padding-right: 1.5rem; }
    .dimensions { grid-template-columns: 1fr; }
    .score-number { font-size: 3.5rem; }
  }
</style>
</head>
<body>
<div class="header">
  <div class="studio-tag">Studio Pierce — Brand Drift-o-Meter</div>
  <h1>How far has your<br>brand <em>drifted?</em></h1>
  <p class="subtitle">Type in any brand name. We'll find it, read it, and tell you where it's lost the thread.</p>
</div>
<div class="input-section">
  <div class="input-wrapper">
    <input type="text" id="brandInput" placeholder="e.g. Patagonia, Monzo, your own brand..." />
    <button class="run-btn" id="runBtn" onclick="runAudit()">RUN AUDIT →</button>
  </div>
  <div class="status-line" id="statusLine"></div>
  <div class="error-msg" id="errorMsg"></div>
</div>
<div class="results" id="results">
  <div class="brand-title" id="brandTitle"></div>
  <div class="audit-meta" id="auditMeta"></div>
  <div class="score-hero">
    <div class="score-number" id="totalScore">—</div>
    <div class="score-denom">/100</div>
  </div>
  <div class="score-label" id="scoreSummary"></div>
<div class="confidence-bar" id="confidenceBar" style="display:none; margin-bottom:2rem;">
  <div style="font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.12em; color:rgba(232,228,220,0.4); text-transform:uppercase; margin-bottom:0.4rem;">Signal confidence</div>
  <div id="confidenceIndicator" style="display:inline-block; font-family:'DM Mono',monospace; font-size:11px; padding:0.3rem 0.75rem; border-radius:2px; margin-bottom:0.4rem;"></div>
  <div id="confidenceNote" style="font-size:12px; color:rgba(232,228,220,0.4); line-height:1.5;"></div>
</div>
  <div class="verdict" id="verdict"></div>
  <div class="dimensions" id="dimensionsGrid"></div>
  <div class="drift-signal">
    <div class="drift-signal-label">Primary drift signal</div>
    <div class="drift-signal-text" id="driftText"></div>
  </div>
  <div class="footer-tag">Studio Pierce — Brand audit experiment</div>
</div>
<script>
function animateScore(el, target) {
  let start = null;
  const step = (ts) => {
    if (!start) start = ts;
    const p = Math.min((ts - start) / 1200, 1);
    el.textContent = Math.round(p * target);
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

async function runAudit() {
  const input = document.getElementById('brandInput').value.trim();
  if (!input) return;
  const btn = document.getElementById('runBtn');
  const status = document.getElementById('statusLine');
  const errorMsg = document.getElementById('errorMsg');
  const results = document.getElementById('results');
  btn.disabled = true;
  errorMsg.textContent = '';
  results.classList.remove('visible');
  const steps = ['Locating brand signals...','Reading public presence...','Analysing tone and visual language...','Checking cultural signals...','Scoring dimensions...','Writing audit...'];
  let i = 0;
  status.className = 'status-line active';
  status.textContent = steps[0];
  const ticker = setInterval(() => { i = (i + 1) % steps.length; status.textContent = steps[i]; }, 1800);
  try {
    const res = await fetch('/api/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ brand: input })
    });
    clearInterval(ticker);
    if (!res.ok) throw new Error(`${res.status}`);
    const audit = await res.json();
    status.className = 'status-line';
    status.textContent = 'Audit complete.';
    document.getElementById('brandTitle').textContent = audit.brand;
    document.getElementById('auditMeta').textContent = `BRAND AUDIT — ${new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }).toUpperCase()}`;
    document.getElementById('scoreSummary').textContent = audit.score_summary;
   if (audit.confidence) {
  const bar = document.getElementById('confidenceBar');
  const indicator = document.getElementById('confidenceIndicator');
  const note = document.getElementById('confidenceNote');
  const colors = { high: 'rgba(100,200,120,0.15)', medium: 'rgba(200,169,110,0.15)', low: 'rgba(200,80,80,0.15)' };
  const textColors = { high: '#64C878', medium: '#C8A96E', low: '#C85050' };
  indicator.style.background = colors[audit.confidence] || colors.medium;
  indicator.style.color = textColors[audit.confidence] || textColors.medium;
  indicator.textContent = audit.confidence.toUpperCase() + ' CONFIDENCE';
  note.textContent = audit.confidence_note || '';
  bar.style.display = 'block';
}
    document.getElementById('verdict').textContent = audit.verdict;
    document.getElementById('driftText').textContent = audit.drift_signal;
    const grid = document.getElementById('dimensionsGrid');
    grid.innerHTML = '';
    audit.dimensions.forEach(dim => {
      const pct = Math.round((dim.score / dim.max) * 100);
      const el = document.createElement('div');
      el.className = 'dimension';
      el.innerHTML = `<div class="dim-header"><div class="dim-name">${dim.name}</div><div class="dim-score">${dim.score}<span>/${dim.max}</span></div></div><div class="dim-bar-track"><div class="dim-bar-fill" style="width:0%" data-pct="${pct}"></div></div><div class="dim-note">${dim.note}</div>`;
      grid.appendChild(el);
    });
    results.classList.add('visible');
    animateScore(document.getElementById('totalScore'), audit.total_score);
    setTimeout(() => { document.querySelectorAll('.dim-bar-fill').forEach(b => { b.style.width = b.dataset.pct + '%'; }); }, 150);
  } catch (err) {
    clearInterval(ticker);
    status.className = 'status-line';
    status.textContent = '';
    errorMsg.textContent = `Something went wrong: ${err.message}`;
    console.error(err);
  }
  btn.disabled = false;
}

document.getElementById('brandInput').addEventListener('keydown', e => { if (e.key === 'Enter') runAudit(); });
</script>
</body>
</html>
